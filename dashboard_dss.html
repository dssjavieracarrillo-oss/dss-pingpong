<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>DSS League — Estadísticas</title>
<style>
:root{color-scheme:light;--bg:#0c1220;--surface:#121a2e;--card:#162034;--border:#243354;--border2:#2e3f60;--text:#eef2ff;--muted:#6b7fa0;--orange:#f97316;--blue:#3b82f6;--cyan:#f97316;--green:#22c55e;--gold:#f59e0b;--gold2:#fbbf24;--red:#ef4444;--purple:#8b5cf6;--silver:#94a3b8;--bronze:#cd7c2f;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

/* ── NAV ── */
nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.nav-brand{font-size:.95rem;font-weight:900;color:#fff;letter-spacing:4px;text-transform:uppercase;text-shadow:0 0 20px #f9731640;}
.nav-actions{display:flex;gap:8px;align-items:center;}
.nav-btn{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:5px 12px;color:var(--muted);font-size:.7rem;font-weight:600;letter-spacing:1px;text-transform:uppercase;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:color .2s,border-color .2s;}
.nav-btn:hover{color:var(--text);border-color:var(--border2);}
.nav-btn.primary{color:var(--cyan);border-color:#f9731640;}
.nav-btn.primary:hover{background:#f9731610;}

/* ── LAYOUT ── */
.page{max-width:1080px;margin:0 auto;padding:20px 20px 48px;width:100%;display:flex;flex-direction:column;gap:20px;}

/* ── QUICK STATS ── */
.qs-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.qs-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;flex-direction:column;gap:4px;}
.qs-label{font-size:.6rem;font-weight:700;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
.qs-value{font-size:1.6rem;font-weight:900;color:#fff;line-height:1;}
.qs-sub{font-size:.7rem;color:var(--muted);}
.qs-card.accent-cyan{border-color:#f9731650;background:linear-gradient(135deg,#2a1000,var(--card));}
.qs-card.accent-gold{border-color:#f59e0b50;background:linear-gradient(135deg,#221500,var(--card));}
.qs-card.accent-green{border-color:#22c55e50;background:linear-gradient(135deg,#0a2218,var(--card));}
.qs-card.accent-cyan .qs-value{color:var(--orange);}
.qs-card.accent-gold .qs-value{color:var(--gold2);}
.qs-card.accent-green .qs-value{color:var(--green);}

/* ── SECTION LABEL ── */
.sec-label{font-size:.6rem;font-weight:800;color:var(--muted);letter-spacing:4px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.sec-label::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── MAIN GRID ── */
.main-grid{display:grid;grid-template-columns:1fr 380px;gap:16px;align-items:start;}
@media(max-width:800px){.main-grid{grid-template-columns:1fr;}}

/* ── STANDINGS TABLE ── */
.standings-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.tbl{width:100%;border-collapse:collapse;}
.tbl thead tr{background:#141920;}
.tbl th{padding:10px 12px;font-size:.56rem;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;text-align:center;}
.tbl th.left{text-align:left;padding-left:16px;}
.tbl td{padding:9px 12px;text-align:center;font-size:.83rem;font-weight:600;border-top:1px solid #222d45;color:var(--text);}
.tbl td.left{text-align:left;padding-left:16px;}
.tbl tbody tr{transition:background .1s;}
.tbl tbody tr:hover{background:#ffffff06;}

/* position badge */
.pos{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;border-radius:7px;font-size:.7rem;font-weight:800;background:#141920;color:var(--muted);}

/* Top 3 rows */
.tbl tbody tr.r1{background:linear-gradient(90deg,#1f1600,#1c2237);}
.tbl tbody tr.r1 .pos{background:#2e1e00;color:var(--gold2);}
.tbl tbody tr.r1 .p-name{color:var(--gold2);font-weight:800;}
.tbl tbody tr.r2{background:linear-gradient(90deg,#161c28,#1c2237);}
.tbl tbody tr.r2 .pos{background:#202c42;color:var(--silver);}
.tbl tbody tr.r2 .p-name{color:var(--silver);font-weight:800;}
.tbl tbody tr.r3{background:linear-gradient(90deg,#1c1006,#1c2237);}
.tbl tbody tr.r3 .pos{background:#281806;color:var(--bronze);}
.tbl tbody tr.r3 .p-name{color:var(--bronze);font-weight:800;}

/* Top 8 rows 4-8 */
.tbl tbody tr.top8{background:#1e2840;}
.tbl tbody tr.top8 .pos{background:#f973161a;color:var(--cyan);}
.tbl tbody tr.top8 .p-name{color:#c0d8f0;}
.top8-tag{display:inline-block;font-size:.48rem;font-weight:800;letter-spacing:1px;background:#f9731618;color:var(--orange);border:1px solid #f9731440;border-radius:4px;padding:1px 5px;margin-left:6px;vertical-align:middle;text-transform:uppercase;}

/* Left accent borders */
.tbl tbody tr.top8 td:first-child{border-left:3px solid var(--cyan);}
.tbl tbody tr.r1 td:first-child{border-left:3px solid var(--gold);}
.tbl tbody tr.r2 td:first-child{border-left:3px solid var(--silver);}
.tbl tbody tr.r3 td:first-child{border-left:3px solid var(--bronze);}

.p-name{font-size:.82rem;}
.dif-pos{color:var(--green);font-weight:700;}
.dif-neg{color:var(--red);font-weight:700;}
.dif-zer{color:var(--muted);}

/* ── FIXTURE ── */
.fixture-wrap{display:flex;flex-direction:column;gap:4px;}
.day-row{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.day-row.is-today{border-color:#f9731640;background:linear-gradient(135deg,#071520,var(--card));}
.day-row.is-done{border-color:#1a3a28;}
.day-row.is-partial{border-color:#3a2e0c;}
.day-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;user-select:none;background:#141920;}
.day-row.is-today .day-hdr{background:#141e2c;}
.day-hdr:hover{background:#1e2840;}
.d-dot{width:6px;height:6px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.day-row.is-done .d-dot{background:var(--green);}
.day-row.is-today .d-dot{background:var(--cyan);box-shadow:0 0 5px var(--cyan);}
.day-row.is-partial .d-dot{background:var(--gold);}
.d-name{flex:1;font-size:.72rem;font-weight:700;color:var(--text);}
.day-row.is-today .d-name{color:var(--cyan);}
.d-meta{font-size:.58rem;font-weight:600;color:var(--muted);}
.day-row.is-done .d-meta{color:var(--green);}
.d-chev{color:var(--border2);font-size:.6rem;transition:transform .2s;}
.day-row.open .d-chev{transform:rotate(180deg);}
.day-body{display:none;}
.day-row.open .day-body{display:block;}
.m-row{display:flex;align-items:center;gap:8px;padding:6px 12px;border-top:1px solid #222d45;}
.m-row:hover{background:#ffffff03;}
.m-p{flex:1;font-size:.73rem;font-weight:600;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.m-p.right{text-align:right;}
.m-p.win{color:var(--gold2);font-weight:800;}
.m-sc{font-size:.78rem;font-weight:900;color:#fff;text-align:center;min-width:52px;flex-shrink:0;}
.m-sc .sw{color:var(--green);}
.m-sc .sl{color:var(--red);}
.m-sc .sp{font-size:.58rem;color:var(--border2);letter-spacing:1px;}
.del-btn{background:none;border:none;color:transparent;font-size:1rem;line-height:1;cursor:pointer;padding:2px 4px;border-radius:4px;transition:color .15s,background .15s;flex-shrink:0;}
.m-row:hover .del-btn{color:#3a4560;}
.del-btn:hover{color:var(--red) !important;background:#ef444415;}

/* ── MOBILE ── */
@media(max-width:640px){
  nav{padding:0 14px;}
  .nav-brand{font-size:.7rem;letter-spacing:2px;}
  .page{padding:12px 12px 40px;gap:14px;}

  /* Stats row: 2 cols, 3rd full width */
  .qs-row{grid-template-columns:1fr 1fr;}
  .qs-row .qs-card:last-child{grid-column:1/-1;}
  .qs-value{font-size:1.3rem;}

  /* Main grid: single column */
  .main-grid{grid-template-columns:1fr;gap:14px;}

  /* Standings: hide less important columns on mobile */
  .hide-mobile{display:none;}

  /* Fixture rows: tighter */
  .m-row{padding:5px 10px;gap:6px;}
  .m-p{font-size:.68rem;}
  .m-sc{font-size:.72rem;min-width:44px;}
  .day-hdr{padding:7px 10px;}
  .d-name{font-size:.68rem;}
  .d-meta{font-size:.55rem;}

  /* Table: make scrollable if needed */
  .standings-wrap{overflow-x:auto;}
  .tbl th,.tbl td{padding:8px 8px;font-size:.72rem;}
  .tbl td.left,.tbl th.left{padding-left:10px;}
  .p-name{font-size:.72rem;}
  .top8-tag{display:none;}
  .pos{width:20px;height:20px;font-size:.62rem;}

  /* Section labels */
  .sec-label{font-size:.55rem;}
}
</style>
</head>
<body>
<nav>
  <span class="nav-brand">🏓 DSS League — Estadísticas</span>
  <div class="nav-actions">
    <button class="nav-btn" onclick="location.reload()">↺ Actualizar</button>
    <a class="nav-btn primary" href="pingpong.html">🏓 Tablero</a>
  </div>
</nav>

<div class="page" id="page"></div>

<script>
const LS_KEY='pp_dss_league';
const PLAYERS=["Abimelec Jesus","Adni Fernandez","Bastian Garces","Bastian Mendieta","Consuelo Matus","Cristian Zapata","Cristobal Valencia","Daniel Torres","Eduardo Escalona","Emmanuel Garrido","Francisco San Martin","Ignacio Leal","Javiera Carrillo","Matias Guzman","Sebastian Cerda","Sebastian Manriquez","Sebastián Fernandez"];
const FIXTURE=[{day:"Lunes 20/04",p1:"Matias Guzman",p2:"Javiera Carrillo"},{day:"Lunes 20/04",p1:"Bastian Garces",p2:"Adni Fernandez"},{day:"Lunes 20/04",p1:"Daniel Torres",p2:"Ignacio Leal"},{day:"Lunes 20/04",p1:"Abimelec Jesus",p2:"Bastian Mendieta"},{day:"Lunes 20/04",p1:"Eduardo Escalona",p2:"Emmanuel Garrido"},{day:"Martes 21/04",p1:"Matias Guzman",p2:"Ignacio Leal"},{day:"Martes 21/04",p1:"Bastian Garces",p2:"Bastian Mendieta"},{day:"Martes 21/04",p1:"Cristobal Valencia",p2:"Sebastian Cerda"},{day:"Martes 21/04",p1:"Cristian Zapata",p2:"Javiera Carrillo"},{day:"Martes 21/04",p1:"Sebastián Fernandez",p2:"Francisco San Martin"},{day:"Miércoles 22/04",p1:"Consuelo Matus",p2:"Cristobal Valencia"},{day:"Miércoles 22/04",p1:"Daniel Torres",p2:"Emmanuel Garrido"},{day:"Miércoles 22/04",p1:"Abimelec Jesus",p2:"Francisco San Martin"},{day:"Miércoles 22/04",p1:"Adni Fernandez",p2:"Eduardo Escalona"},{day:"Miércoles 22/04",p1:"Sebastián Fernandez",p2:"Sebastian Cerda"},{day:"Jueves 23/04",p1:"Bastian Mendieta",p2:"Javiera Carrillo"},{day:"Jueves 23/04",p1:"Cristian Zapata",p2:"Adni Fernandez"},{day:"Jueves 23/04",p1:"Matias Guzman",p2:"Emmanuel Garrido"},{day:"Jueves 23/04",p1:"Cristian Zapata",p2:"Francisco San Martin"},{day:"Jueves 23/04",p1:"Abimelec Jesus",p2:"Consuelo Matus"},{day:"Viernes 24/04",p1:"Cristian Zapata",p2:"Emmanuel Garrido"},{day:"Viernes 24/04",p1:"Abimelec Jesus",p2:"Sebastian Cerda"},{day:"Viernes 24/04",p1:"Eduardo Escalona",p2:"Cristobal Valencia"},{day:"Viernes 24/04",p1:"Sebastián Fernandez",p2:"Consuelo Matus"},{day:"Viernes 24/04",p1:"Adni Fernandez",p2:"Daniel Torres"},{day:"Lunes 27/04",p1:"Adni Fernandez",p2:"Ignacio Leal"},{day:"Lunes 27/04",p1:"Javiera Carrillo",p2:"Sebastián Fernandez"},{day:"Lunes 27/04",p1:"Matias Guzman",p2:"Bastian Mendieta"},{day:"Lunes 27/04",p1:"Bastian Garces",p2:"Sebastian Cerda"},{day:"Lunes 27/04",p1:"Daniel Torres",p2:"Cristobal Valencia"}];
const INITIAL_RESULTS={"Javiera Carrillo|||Matias Guzman":{pa:"Javiera Carrillo",pb:"Matias Guzman",sa:3,sb:11},"Adni Fernandez|||Bastian Garces":{pa:"Adni Fernandez",pb:"Bastian Garces",sa:7,sb:11},"Daniel Torres|||Ignacio Leal":{pa:"Daniel Torres",pb:"Ignacio Leal",sa:9,sb:11},"Abimelec Jesus|||Bastian Mendieta":{pa:"Abimelec Jesus",pb:"Bastian Mendieta",sa:7,sb:11},"Eduardo Escalona|||Emmanuel Garrido":{pa:"Eduardo Escalona",pb:"Emmanuel Garrido",sa:8,sb:11},"Ignacio Leal|||Matias Guzman":{pa:"Ignacio Leal",pb:"Matias Guzman",sa:11,sb:9},"Bastian Garces|||Bastian Mendieta":{pa:"Bastian Garces",pb:"Bastian Mendieta",sa:11,sb:3},"Cristobal Valencia|||Sebastian Cerda":{pa:"Cristobal Valencia",pb:"Sebastian Cerda",sa:5,sb:11},"Cristian Zapata|||Javiera Carrillo":{pa:"Cristian Zapata",pb:"Javiera Carrillo",sa:11,sb:9},"Francisco San Martin|||Sebastián Fernandez":{pa:"Francisco San Martin",pb:"Sebastián Fernandez",sa:1,sb:11},"Consuelo Matus|||Cristobal Valencia":{pa:"Consuelo Matus",pb:"Cristobal Valencia",sa:2,sb:11},"Daniel Torres|||Emmanuel Garrido":{pa:"Daniel Torres",pb:"Emmanuel Garrido",sa:11,sb:6},"Abimelec Jesus|||Francisco San Martin":{pa:"Abimelec Jesus",pb:"Francisco San Martin",sa:7,sb:11},"Adni Fernandez|||Eduardo Escalona":{pa:"Adni Fernandez",pb:"Eduardo Escalona",sa:11,sb:4},"Sebastian Cerda|||Sebastián Fernandez":{pa:"Sebastian Cerda",pb:"Sebastián Fernandez",sa:11,sb:8},"Bastian Mendieta|||Javiera Carrillo":{pa:"Bastian Mendieta",pb:"Javiera Carrillo",sa:9,sb:11},"Adni Fernandez|||Cristian Zapata":{pa:"Adni Fernandez",pb:"Cristian Zapata",sa:7,sb:11},"Emmanuel Garrido|||Matias Guzman":{pa:"Emmanuel Garrido",pb:"Matias Guzman",sa:7,sb:11},"Cristian Zapata|||Francisco San Martin":{pa:"Cristian Zapata",pb:"Francisco San Martin",sa:9,sb:11},"Abimelec Jesus|||Consuelo Matus":{pa:"Abimelec Jesus",pb:"Consuelo Matus",sa:11,sb:2},
  "Cristian Zapata|||Emmanuel Garrido":{pa:"Cristian Zapata",pb:"Emmanuel Garrido",sa:11,sb:4},
  "Abimelec Jesus|||Sebastian Cerda":{pa:"Abimelec Jesus",pb:"Sebastian Cerda",sa:10,sb:11},
  "Cristobal Valencia|||Eduardo Escalona":{pa:"Cristobal Valencia",pb:"Eduardo Escalona",sa:11,sb:8},
  "Consuelo Matus|||Sebastián Fernandez":{pa:"Consuelo Matus",pb:"Sebastián Fernandez",sa:6,sb:11},
  "Adni Fernandez|||Daniel Torres":{pa:"Adni Fernandez",pb:"Daniel Torres",sa:11,sb:3},
  "Adni Fernandez|||Ignacio Leal":{pa:"Adni Fernandez",pb:"Ignacio Leal",sa:4,sb:11},
  "Javiera Carrillo|||Sebastián Fernandez":{pa:"Javiera Carrillo",pb:"Sebastián Fernandez",sa:11,sb:9},
  "Bastian Mendieta|||Matias Guzman":{pa:"Bastian Mendieta",pb:"Matias Guzman",sa:7,sb:11},
  "Bastian Garces|||Sebastian Cerda":{pa:"Bastian Garces",pb:"Sebastian Cerda",sa:11,sb:3},
  "Cristobal Valencia|||Daniel Torres":{pa:"Cristobal Valencia",pb:"Daniel Torres",sa:11,sb:8}};

function matchKey(a,b){return[a,b].sort().join('|||');}
function delMatch(key){
  if(!confirm('¿Eliminar este resultado?'))return;
  const d=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
  delete d[key];
  localStorage.setItem(LS_KEY,JSON.stringify(d));
  render();
}
function seedResults(){const d=JSON.parse(localStorage.getItem(LS_KEY)||'{}');let ch=false;Object.entries(INITIAL_RESULTS).forEach(([k,v])=>{if(!d[k]){d[k]=v;ch=true;}});if(ch)localStorage.setItem(LS_KEY,JSON.stringify(d));}
function computeStats(){
  const d=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
  const s={};PLAYERS.forEach(p=>s[p]={pj:0,pg:0,pp:0,pf:0,pc:0});
  FIXTURE.forEach(m=>{
    const key=matchKey(m.p1,m.p2);const res=d[key];if(!res)return;
    let s1,s2;if(res.pa===m.p1){s1=res.sa;s2=res.sb;}else{s1=res.sb;s2=res.sa;}
    s[m.p1].pj++;s[m.p2].pj++;s[m.p1].pf+=s1;s[m.p1].pc+=s2;s[m.p2].pf+=s2;s[m.p2].pc+=s1;
    if(s1>s2){s[m.p1].pg++;s[m.p2].pp++;}else{s[m.p2].pg++;s[m.p1].pp++;}
  });
  return PLAYERS.map(p=>({name:p,...s[p],dif:s[p].pf-s[p].pc})).sort((a,b)=>b.pg-a.pg||b.dif-a.dif||b.pf-a.pf);
}

function dif(v){
  const c=v>0?'dif-pos':v<0?'dif-neg':'dif-zer';
  return`<span class="${c}">${v>0?'+':''}${v}</span>`;
}

function render(){
  const stats=computeStats();
  const data=JSON.parse(localStorage.getItem(LS_KEY)||'{}');
  const totalPlayed=Object.keys(data).length;
  const leader=stats[0];
  const days=[...new Set(FIXTURE.map(m=>m.day))];
  const todayStr='Lunes 27/04';
  // next unplayed match
  const nextMatch=FIXTURE.find(m=>!data[matchKey(m.p1,m.p2)]);

  let html=``;

  // Quick stats
  html+=`<div class="qs-row">
    <div class="qs-card accent-gold">
      <span class="qs-label">Líder actual</span>
      <span class="qs-value">${leader.pg}</span>
      <span class="qs-sub">${leader.name}</span>
    </div>
    <div class="qs-card accent-cyan">
      <span class="qs-label">Partidos jugados</span>
      <span class="qs-value">${totalPlayed}</span>
      <span class="qs-sub">de ${FIXTURE.length} en total</span>
    </div>
    <div class="qs-card accent-green">
      <span class="qs-label">Próximo partido</span>
      <span class="qs-value" style="font-size:.95rem;margin-top:2px">${nextMatch?nextMatch.p1.split(' ')[0]+' vs '+nextMatch.p2.split(' ')[0]:'—'}</span>
      <span class="qs-sub">${nextMatch?nextMatch.day:'Torneo finalizado'}</span>
    </div>
  </div>`;

  // Main grid
  html+=`<div class="main-grid">`;

  // ── STANDINGS ──
  html+=`<div>
    <div class="sec-label">📊 Tabla de Posiciones</div>
    <div class="standings-wrap">
      <table class="tbl">
        <thead><tr>
          <th style="width:40px">#</th>
          <th class="left">Jugador</th>
          <th>PJ</th><th>PG</th><th>PP</th>
          <th class="hide-mobile">PF</th><th class="hide-mobile">PC</th><th>DIF</th>
        </tr></thead>
        <tbody>`;

  stats.forEach((p,i)=>{
    const rClass=i===0?'r1':i===1?'r2':i===2?'r3':i<8?'top8':'';
    const posIcon=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
    const top8tag=i>=3&&i<8?'<span class="top8-tag">Top 8</span>':'';
    html+=`<tr class="${rClass}">
      <td><span class="pos">${posIcon||i+1}</span></td>
      <td class="left"><span class="p-name">${p.name}</span>${top8tag}</td>
      <td style="color:var(--muted)">${p.pj}</td>
      <td style="color:var(--green);font-weight:800">${p.pg}</td>
      <td style="color:var(--red)">${p.pp}</td>
      <td class="hide-mobile">${p.pf}</td>
      <td class="hide-mobile" style="color:var(--muted)">${p.pc}</td>
      <td>${dif(p.dif)}</td>
    </tr>`;
  });

  html+=`</tbody></table></div></div>`;

  // ── FIXTURE ──
  html+=`<div>
    <div class="sec-label">📅 Partidos por Día</div>
    <div class="fixture-wrap">`;

  days.forEach(day=>{
    const matches=FIXTURE.filter(m=>m.day===day);
    const played=matches.filter(m=>data[matchKey(m.p1,m.p2)]).length;
    const isToday=day===todayStr;
    const isDone=played===matches.length;
    const isPartial=played>0&&!isDone;
    const stClass=isDone?'is-done':isToday?'is-today':isPartial?'is-partial':'';
    const meta=isDone?`✓ ${played}/${matches.length}`:isToday?`⚡ Hoy · ${played}/${matches.length}`:isPartial?`${played}/${matches.length}`:` ${matches.length} partidos`;
    const autoOpen=isToday||isPartial;
    html+=`<div class="day-row ${stClass}${autoOpen?' open':''}">
      <div class="day-hdr" onclick="this.parentElement.classList.toggle('open')">
        <span class="d-dot"></span>
        <span class="d-name">${day}</span>
        <span class="d-meta">${meta}</span>
        <span class="d-chev">▼</span>
      </div>
      <div class="day-body">`;
    matches.forEach(m=>{
      const key=matchKey(m.p1,m.p2);const res=data[key];
      let sp1,sp2;
      if(res){if(res.pa===m.p1){sp1=res.sa;sp2=res.sb;}else{sp1=res.sb;sp2=res.sa;}}
      const w1=res&&sp1>sp2,w2=res&&sp2>sp1;
      html+=`<div class="m-row">
        <span class="m-p${w1?' win':''}">${m.p1}</span>
        <span class="m-sc">`;
      if(res){html+=`<span class="sw${!w1?' sl':''}">${sp1}</span><span style="color:#1e2c42;margin:0 2px">–</span><span class="${w2?'sw':'sl'}">${sp2}</span>`;}
      else{html+=`<span class="sp">vs</span>`;}
      html+=`</span><span class="m-p right${w2?' win':''}">${m.p2}</span>`;
      if(res){html+=`<button class="del-btn" title="Eliminar resultado" onclick="delMatch('${key}')">×</button>`;}
      html+=`</div>`;
    });
    html+=`</div></div>`;
  });

  html+=`</div></div></div>`;
  document.getElementById('page').innerHTML=html;
}

seedResults();render();
</script></body></html>
